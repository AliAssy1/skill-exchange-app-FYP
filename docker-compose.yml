version: "3.8"

services:
  # MySQL Database
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-skillexchange2024}
      MYSQL_DATABASE: ${DB_NAME:-skill_exchange}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: ./backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-skillexchange2024}
      - DB_NAME=${DB_NAME:-skill_exchange}
      - DB_PORT=3306
      - JWT_SECRET=${JWT_SECRET:-change_this_in_production}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
